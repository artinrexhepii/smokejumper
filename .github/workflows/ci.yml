name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm -r --if-present build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build server image
        run: docker build -f packages/server/Dockerfile -t smokejumper-server:ci .
      - name: build dashboard image
        run: docker build -f apps/dashboard/Dockerfile -t smokejumper-dashboard:ci .
      - name: build demo image
        run: docker build -f demo/Dockerfile -t smokejumper-demo:ci .

  kind-e2e:
    runs-on: ubuntu-latest
    needs: [check, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: smokejumper
      - name: build images
        run: |
          docker build -f packages/server/Dockerfile -t smokejumper-server:ci .
          docker build -f apps/dashboard/Dockerfile -t smokejumper-dashboard:ci .
          docker build -f demo/Dockerfile -t smokejumper-demo:ci .
      - name: load images into kind
        run: |
          kind load docker-image smokejumper-server:ci --name smokejumper
          kind load docker-image smokejumper-dashboard:ci --name smokejumper
          docker pull pgvector/pgvector:pg17
          kind load docker-image pgvector/pgvector:pg17 --name smokejumper
      - name: chart lint and snapshot
        run: bash deploy/helm/smokejumper/tests/snapshot.sh
      - name: generate encryption key
        run: echo "SMOKEJUMPER_ENCRYPTION_KEY=$(openssl rand -base64 32)" >> "$GITHUB_ENV"
      - name: helm install
        run: |
          helm install smokejumper deploy/helm/smokejumper \
            --set image.server.repository=smokejumper-server \
            --set image.server.tag=ci \
            --set image.dashboard.repository=smokejumper-dashboard \
            --set image.dashboard.tag=ci \
            --set image.pullPolicy=Never \
            --set fakeModel=true \
            --set secureCookies=false \
            --set encryptionKey="$SMOKEJUMPER_ENCRYPTION_KEY" \
            --wait --timeout 300s
      - name: wait for migrate-seed job
        run: kubectl wait --for=condition=complete job/smokejumper-migrate-seed --timeout=180s
      - name: smoke the deployed stack
        run: |
          kubectl port-forward svc/smokejumper-server 3400:3400 &
          PF=$!
          for _ in $(seq 1 30); do curl -fsS http://localhost:3400/healthz && break; sleep 2; done
          curl -fsS http://localhost:3400/healthz
          curl -fsS -c /tmp/jar -X POST http://localhost:3400/api/auth/login \
            -H 'content-type: application/json' \
            -d '{"email":"admin@example.com","password":"smokejumper"}'
          curl -fsS -b /tmp/jar http://localhost:3400/api/me | grep -q admin@example.com
          kill "$PF"
      - name: offline acceptance e2e
        run: pnpm vitest run demo/test/e2e.test.ts
      - name: start integration services
        run: docker compose -f docker-compose.integration.yml up -d --wait
      - name: integration suite
        env:
          SMOKEJUMPER_INTEGRATION: "1"
        run: |
          kind get kubeconfig --name smokejumper > /tmp/kind.kubeconfig
          KUBECONFIG=/tmp/kind.kubeconfig pnpm test:integration
      - name: tear down integration services
        if: always()
        run: docker compose -f docker-compose.integration.yml down

  registry-index:
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: build the unsigned registry index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec tsx scripts/build-registry-index.ts
      - name: sign the registry index with the first-party key
        env:
          SMOKEJUMPER_REGISTRY_SIGNING_KEY: ${{ secrets.SMOKEJUMPER_REGISTRY_SIGNING_KEY }}
          SMOKEJUMPER_REGISTRY_SIGNING_KEY_ID: smokejumper-first-party-2026
        run: pnpm exec tsx scripts/sign-index.ts sign registry/index.unsigned.json packages/registry/first-party-index.json
      - name: verify the signed index against the baked trust key
        run: pnpm exec tsx scripts/sign-index.ts verify packages/registry/first-party-index.json
      - name: publish the refreshed index on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- packages/registry/first-party-index.json; then
            echo "first-party index unchanged"
          else
            git config user.name "smokejumper-ci"
            git config user.email "ci@smokejumper.invalid"
            git add packages/registry/first-party-index.json
            git commit -m "refresh signed registry index"
            git push
          fi
