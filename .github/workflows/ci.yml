name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm -r --if-present build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build server image
        run: docker build -f packages/server/Dockerfile -t smokejumper-server:ci .
      - name: build dashboard image
        run: docker build -f apps/dashboard/Dockerfile -t smokejumper-dashboard:ci .
      - name: build demo image
        run: docker build -f demo/Dockerfile -t smokejumper-demo:ci .
