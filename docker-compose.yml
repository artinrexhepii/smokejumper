name: smokejumper

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: smokejumper
      POSTGRES_PASSWORD: smokejumper
      POSTGRES_DB: smokejumper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smokejumper -d smokejumper"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    image: smokejumper-server
    environment:
      DATABASE_URL: postgres://smokejumper:smokejumper@postgres:5432/smokejumper
      SMOKEJUMPER_ENCRYPTION_KEY: ${SMOKEJUMPER_ENCRYPTION_KEY:?missing - copy .env.example to .env and generate a key}
      PORT: "3400"
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:3000}
      SMOKEJUMPER_FAKE_MODEL: ${SMOKEJUMPER_FAKE_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SMOKEJUMPER_MODEL_PROVIDER: ${SMOKEJUMPER_MODEL_PROVIDER:-}
      SMOKEJUMPER_TRIAGE_MODEL: ${SMOKEJUMPER_TRIAGE_MODEL:-}
      SMOKEJUMPER_INVESTIGATOR_MODEL: ${SMOKEJUMPER_INVESTIGATOR_MODEL:-}
      SMOKEJUMPER_SYNTHESIS_MODEL: ${SMOKEJUMPER_SYNTHESIS_MODEL:-}
    ports:
      - "3400:3400"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # alpine has no curl; busybox wget ships with the base image
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3400/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3400}
    image: smokejumper-dashboard
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  docker-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    environment:
      CONTAINERS: "1"
      POST: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
