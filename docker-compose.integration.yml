name: smokejumper-integration
services:
  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      SERVICES: "cloudwatch,logs"
      DEBUG: "0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./docker/integration/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    healthcheck:
      # the prometheus image is busybox-based; no curl, wget is available
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 20

  loki:
    image: grafana/loki:3.2.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./docker/integration/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    extra_hosts:
      # alertmanager runs in the compose network and must reach back to the
      # test process's ephemeral webhook receiver running on the host
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9093/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 20
