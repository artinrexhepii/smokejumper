route:
  receiver: smokejumper-webhook
  group_wait: 1s
  group_interval: 1s
  repeat_interval: 1h

receivers:
  - name: smokejumper-webhook
    webhook_configs:
      - url: http://host.docker.internal:9095/webhook
        send_resolved: false
        http_config:
          authorization:
            type: Bearer
            credentials: integration-test-token
