apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smokejumper.secretName" . }}
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "smokejumper.databaseUrl" . | quote }}
  anthropic-api-key: {{ .Values.anthropicApiKey | quote }}
  gemini-api-key: {{ .Values.geminiApiKey | quote }}
  oidc-client-secret: {{ .Values.oidc.clientSecret | quote }}
  {{- if not .Values.existingSecret }}
  encryption-key: {{ required "encryptionKey is required unless existingSecret is set" .Values.encryptionKey | quote }}
  {{- end }}
