apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smokejumper.fullname" . }}-server
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "smokejumper.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "smokejumper.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: {{ include "smokejumper.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.postgres.image | quote }}
          command: ["sh", "-c", "until pg_isready -h {{ include "smokejumper.postgresHost" . }} -U {{ .Values.postgres.username }}; do echo waiting for postgres; sleep 2; done"]
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.server.repository }}:{{ .Values.image.server.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.server.port }}
          envFrom:
            - configMapRef:
                name: {{ include "smokejumper.configName" . }}
          env:
            - name: SMOKEJUMPER_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "smokejumper.encryptionSecretName" . }}
                  key: encryption-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "smokejumper.secretName" . }}
                  key: database-url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "smokejumper.secretName" . }}
                  key: anthropic-api-key
            {{- if .Values.oidc.enabled }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "smokejumper.secretName" . }}
                  key: oidc-client-secret
            {{- end }}
          {{- if .Values.plugins.volume.enabled }}
          volumeMounts:
            - name: plugins
              mountPath: {{ .Values.plugins.dir }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.plugins.volume.enabled }}
      volumes:
        - name: plugins
          persistentVolumeClaim:
            claimName: {{ include "smokejumper.fullname" . }}-plugins
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "smokejumper.fullname" . }}-server
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "smokejumper.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.service.server.port }}
      targetPort: http
