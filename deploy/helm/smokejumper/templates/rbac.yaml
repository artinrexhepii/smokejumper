{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "smokejumper.fullname" . }}-kubernetes-reader
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "smokejumper.fullname" . }}-kubernetes-reader
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "smokejumper.fullname" . }}-kubernetes-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "smokejumper.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
