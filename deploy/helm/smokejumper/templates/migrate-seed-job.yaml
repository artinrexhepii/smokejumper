{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "smokejumper.fullname" . }}-migrate-seed
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate-seed
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "smokejumper.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate-seed
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-db
          image: {{ .Values.postgres.image | quote }}
          command: ["sh", "-c", "until pg_isready -h {{ include "smokejumper.postgresHost" . }} -U {{ .Values.postgres.username }}; do echo waiting for postgres; sleep 2; done"]
      {{- end }}
      containers:
        - name: migrate-seed
          image: "{{ .Values.image.server.repository }}:{{ .Values.image.server.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/seed.js"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "smokejumper.secretName" . }}
                  key: database-url
            - name: SMOKEJUMPER_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "smokejumper.encryptionSecretName" . }}
                  key: encryption-key
{{- end }}
