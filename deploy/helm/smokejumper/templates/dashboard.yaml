apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smokejumper.fullname" . }}-dashboard
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "smokejumper.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "smokejumper.labels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.dashboard.repository }}:{{ .Values.image.dashboard.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.service.dashboard.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
          ports:
            - name: http
              containerPort: {{ .Values.service.dashboard.port }}
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "smokejumper.fullname" . }}-dashboard
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "smokejumper.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: {{ .Values.service.dashboard.port }}
      targetPort: http
