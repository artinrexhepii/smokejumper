{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "smokejumper.fullname" . }}
  labels:
    {{- include "smokejumper.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ default (printf "%s-tls" (include "smokejumper.fullname" .)) .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "smokejumper.fullname" . }}-server
                port:
                  number: {{ .Values.service.server.port }}
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: {{ include "smokejumper.fullname" . }}-server
                port:
                  number: {{ .Values.service.server.port }}
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: {{ include "smokejumper.fullname" . }}-server
                port:
                  number: {{ .Values.service.server.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "smokejumper.fullname" . }}-dashboard
                port:
                  number: {{ .Values.service.dashboard.port }}
{{- end }}
